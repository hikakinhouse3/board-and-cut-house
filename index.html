<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>board and cut house</title>
<style>
:root {
  color-scheme: dark;
  --bg: #000;
  --fg: #fff;
  --fg-dim: rgba(255, 255, 255, 0.7);
  --fg-faint: rgba(255, 255, 255, 0.4);
  --accent: rgba(255, 255, 255, 0.1);
  --border: rgba(255, 255, 255, 0.15);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 24px;
}

header {
  text-align: center;
  margin-bottom: 60px;
}

.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 24px;
  border: 2px dashed rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}

.tagline {
  font-size: 14px;
  color: var(--fg-dim);
  margin-bottom: 32px;
}

.description {
  font-size: 15px;
  color: var(--fg-dim);
  margin-bottom: 40px;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
}

.section {
  margin-top: 48px;
}

.section-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-faint);
  margin-bottom: 16px;
  text-align: center;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.link {
  display: block;
  padding: 16px 20px;
  background: var(--bg);
  color: var(--fg);
  text-decoration: none;
  font-size: 14px;
  transition: background 0.15s;
}

.link:hover {
  background: var(--accent);
}

.link-arrow {
  float: right;
  color: var(--fg-faint);
}

footer {
  margin-top: 80px;
  text-align: center;
  font-size: 11px;
  color: var(--fg-faint);
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

@media (max-width: 480px) {
  .container {
    padding: 40px 20px;
  }
  h1 {
    font-size: 24px;
  }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"></div>
    <h1>board and cut house</h1>
    <p class="tagline">物理破壊シミュレーター</p>
    <p class="description">
      画面中央の白い円から瓶・皿・壺、そしてあなたの写真を壁に向けて射出。リアルな物理演算と合成音響、ハプティクスが生み出す破壊の爽快感をお届けします。
    </p>
  </header>

  <div class="section">
    <p class="section-title">App Store</p>
    <div class="links">
      <a href="#" class="link">
        App Store でダウンロード
        <span class="link-arrow">→</span>
      </a>
    </div>
  </div>

  <div class="section">
    <p class="section-title">サポート・法的文書</p>
    <div class="links">
      <a href="support.html" class="link">
        サポート
        <span class="link-arrow">→</span>
      </a>
      <a href="terms.html" class="link">
        利用規約
        <span class="link-arrow">→</span>
      </a>
      <a href="privacy.html" class="link">
        プライバシーポリシー
        <span class="link-arrow">→</span>
      </a>
      <a href="commercial-law.html" class="link">
        特定商取引法に基づく表記
        <span class="link-arrow">→</span>
      </a>
    </div>
  </div>

  <footer>
    © 2026 [氏名]
  </footer>
</div>
</body>
</html>
